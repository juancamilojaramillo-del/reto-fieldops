<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FieldOps · Órdenes de Trabajo</title>
  <style>
    /* ============================================================
       VARIABLES DE TEMA
       Centralizamos colores y medidas para poder cambiar el look
       desde un solo lugar.
    ============================================================ */
    :root {
      --bg: #0b1020;
      --bg-card: #141b2e;
      --bg-card-hover: #1a2238;
      --border: #232c45;
      --text: #e8ecf4;
      --text-dim: #8a96ad;

      --accent: #4f8cff;       /* azul corporativo */
      --accent-glow: #4f8cff33;

      --prio-alta: #ff4d6d;    /* rojo */
      --prio-media: #ffb020;   /* ámbar */
      --prio-baja: #2ee59d;    /* verde */

      --estado-pendiente: #8a96ad;
      --estado-proceso: #4f8cff;
      --estado-completada: #2ee59d;

      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    /* ============================================================
       RESET BÁSICO
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 15% 0%, rgba(79,140,255,0.08), transparent 50%),
        radial-gradient(circle at 85% 100%, rgba(46,229,157,0.05), transparent 50%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 16px;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    header {
      margin-bottom: 24px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .brand-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .subtitle {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 4px;
    }

    /* ============================================================
       KPIs (4 tarjetas con métricas)
    ============================================================ */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .kpi {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      position: relative;
      overflow: hidden;
    }
    .kpi::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .kpi-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .kpi-value {
      font-size: 26px;
      font-weight: 700;
      margin-top: 4px;
    }

    /* ============================================================
       TOOLBAR (búsqueda, filtros, botón nuevo)
    ============================================================ */
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .input, .select, .btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.15s;
    }
    .input { flex: 1; min-width: 200px; }
    .input:focus, .select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .btn {
      cursor: pointer;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: none;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn.secondary {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* ============================================================
       GRID DE ÓRDENES DE TRABAJO
    ============================================================ */
    #contenedor {
      min-height: 200px;
    }
    .ordenes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    /* ============================================================
       MOBILE
    ============================================================ */
    @media (max-width: 600px) {
      body { padding: 14px 10px; }
      .kpi-value { font-size: 22px; }
      .toolbar { flex-direction: column; }
      .input, .select, .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <header>
      <div class="brand">
        <div class="brand-dot"></div>
        FieldOps
      </div>
      <div class="subtitle">Gestión de órdenes de trabajo · API v1</div>
    </header>

    <!-- KPIs -->
    <div class="kpi-grid" id="kpis">
      <div class="kpi">
        <div class="kpi-label">Activas hoy</div>
        <div class="kpi-value" id="kpi-activas">—</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">En proceso</div>
        <div class="kpi-value" id="kpi-proceso">—</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Completadas</div>
        <div class="kpi-value" id="kpi-completadas">—</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">% cumplimiento</div>
        <div class="kpi-value" id="kpi-cumplimiento">—</div>
      </div>
    </div>

    <!-- TOOLBAR: búsqueda + filtros + botón nueva orden -->
    <div class="toolbar">
      <input type="text" class="input" id="buscar" placeholder="🔍 Buscar por cliente o título..." />
      <select class="select" id="filtroEstado">
        <option value="">Todos los estados</option>
        <option value="programada">Programada</option>
        <option value="en_proceso">En proceso</option>
        <option value="completada">Completada</option>
      </select>
      <select class="select" id="filtroPrioridad">
        <option value="">Toda prioridad</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
      <button class="btn" id="btnNueva">+ Nueva orden</button>
    </div>

    <!-- CONTENEDOR de tarjetas (lo llena el JS) -->
    <div id="contenedor">
      <p style="color: var(--text-dim); text-align: center; padding: 40px;">
        Aquí aparecerán las órdenes de trabajo (Paso 3)
      </p>
    </div>

  </div>
</body>
</html>
